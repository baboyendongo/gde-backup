<div class="bg-login" role="main">
  <div class="decoration decoration-1" aria-hidden="true"></div>
  <div class="decoration decoration-2" aria-hidden="true"></div>
  <div class="decoration decoration-3" aria-hidden="true"></div>

  <div class="notifications-container" *ngIf="notifications.length > 0" role="status" aria-live="polite">
    <div *ngFor="let notif of notifications"
         class="notification-toast"
         [ngClass]="'notification-' + notif.type">
      <div class="notification-content">
        <i class="notification-icon" [ngClass]="getNotificationIcon(notif.type)" aria-hidden="true"></i>
        <span class="notification-message">{{ notif.message }}</span>
      </div>
      <button class="notification-close"
              type="button"
              (click)="removeNotification(notif.id)"
              [attr.aria-label]="'Fermer la notification'">
        <i class="bi bi-x" aria-hidden="true"></i>
      </button>
    </div>
  </div>

  <div class="login-wrapper">
    <section class="login-form-section" aria-labelledby="login-heading">
      <div class="login-container">
        <header class="login-header">
          <div class="logo-circle">
            <img src="assets/logo/logo_mauritel.png"
                 width="120"
                 height="72"
                 alt="Logo Mauritel"
                 class="logo-image" />
          </div>
          <h1 id="login-heading" class="login-title">Connexion</h1>
          <p class="login-subtitle">Identifiez-vous pour accéder à l’application</p>
        </header>

        <div class="card-custom">
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
            <div class="form-group">
              <label class="form-label" for="username">
                <i class="bi bi-person" aria-hidden="true"></i>
                Nom d’utilisateur
              </label>
              <div class="input-wrapper">
                <input id="username"
                       type="text"
                       class="form-control"
                       formControlName="username"
                       placeholder="Ex. prenom.nom"
                       autocomplete="username"
                       [attr.aria-invalid]="loginForm.controls.username.touched && loginForm.controls.username.invalid"
                       [attr.aria-describedby]="(loginForm.controls.username.touched && loginForm.controls.username.hasError('required')) ? 'username-error' : null" />
                <i class="input-icon bi bi-person-fill" aria-hidden="true"></i>
              </div>
              <p *ngIf="loginForm.controls.username.touched && loginForm.controls.username.hasError('required')"
                 id="username-error"
                 class="error-message">
                <i class="bi bi-exclamation-circle" aria-hidden="true"></i>
                Saisissez votre nom d’utilisateur
              </p>
            </div>

            <div class="form-group">
              <label class="form-label" for="password">
                <i class="bi bi-lock" aria-hidden="true"></i>
                Mot de passe
              </label>
              <div class="input-wrapper">
                <input id="password"
                       type="password"
                       class="form-control"
                       formControlName="password"
                       placeholder="Mot de passe"
                       autocomplete="current-password"
                       [attr.aria-invalid]="loginForm.controls.password.touched && loginForm.controls.password.invalid"
                       [attr.aria-describedby]="(loginForm.controls.password.touched && loginForm.controls.password.hasError('required')) ? 'password-error' : null" />
                <i class="input-icon bi bi-lock-fill" aria-hidden="true"></i>
              </div>
              <p *ngIf="loginForm.controls.password.touched && loginForm.controls.password.hasError('required')"
                 id="password-error"
                 class="error-message">
                <i class="bi bi-exclamation-circle" aria-hidden="true"></i>
                Saisissez votre mot de passe
              </p>
            </div>

            <button type="submit"
                    class="btn-primary-custom"
                    [disabled]="isSubmitting || loginForm.invalid"
                    [attr.aria-busy]="isSubmitting">
              <span class="btn-text">
                {{ isSubmitting ? 'Connexion en cours…' : 'Se connecter' }}
              </span>
              <svg *ngIf="!isSubmitting"
                   xmlns="http://www.w3.org/2000/svg"
                   width="18"
                   height="18"
                   fill="currentColor"
                   viewBox="0 0 16 16"
                   class="btn-icon"
                   aria-hidden="true">
                <path fill-rule="evenodd" d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8z" />
              </svg>
              <span *ngIf="isSubmitting" class="spinner" aria-hidden="true"></span>
            </button>
          </form>
        </div>

        <footer class="login-footer">
          <p class="footer-text">
            <i class="bi bi-shield-lock" aria-hidden="true"></i>
            Connexion sécurisée — vos données sont protégées
          </p>
        </footer>
      </div>
    </section>
  </div>
</div>
